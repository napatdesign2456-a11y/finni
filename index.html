<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finni SME</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="app">

  <!-- 📱 APP -->
  <header>
    <h1>Finni</h1>
  </header>

  <section class="balance">
    <h2>ยอดเงินคงเหลือ</h2>
    <h1 id="balance">฿0</h1>
  </section>

  <div class="actions">
    <button onclick="addIncome()">+ รายรับ</button>
    <button onclick="addExpense()">- รายจ่าย</button>
  </div>

  <div class="summary">
    <p>รายรับ: <span id="income">0</span></p>
    <p>รายจ่าย: <span id="expense">0</span></p>
    <p>กำไร/ขาดทุน: <span id="profit">0</span></p>
  </div>

  <ul id="transactionList"></ul>

  <!-- 💰 PRO -->
  <div class="pro-box">
    <h3>Upgrade Pro</h3>
    <p>ใช้ฟรี 10 รายการ</p>
    <p>50฿/เดือน | 500฿/ปี</p>
    <button onclick="showPaymentOptions()">อัปเกรด</button>
    <button onclick="confirmPayment()">ฉันจ่ายแล้ว</button>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
