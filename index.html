<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Finni SME</title>

  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
</head>

<body>

<div class="app">

  <!-- 🔐 LOGIN -->
  <div class="login-box" id="loginBox">
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">ลงชื่อเข้าใช้</button>
  </div>

  <!-- 📱 APP -->
  <div id="mainApp" style="display:none;">

    <header>
      <h1>FinFlow</h1>
      <button onclick="logout()">Logout</button>
    </header>

    <section class="balance">
      <h2>Balance</h2>
      <h1 id="balance">฿0</h1>
    </section>

    <div class="actions">
      <button onclick="addIncome()">+ Income</button>
      <button onclick="addExpense()">- Expense</button>
    </div>

    <div class="summary">
      <p>Income: <span id="income">0</span></p>
      <p>Expense: <span id="expense">0</span></p>
      <p>Profit: <span id="profit">0</span></p>
    </div>

    <ul id="transactionList"></ul>

    <!-- 💰 PRO -->
    <div class="pro-box">
      <h3>Upgrade Pro</h3>
      <p>ใช้ฟรี 10 รายการ</p>
      <p>Pro: 50฿/เดือน</p>
      <button onclick="showQR()">จ่ายเงิน</button>
      <button onclick="confirmPayment()">ฉันจ่ายแล้ว</button>
    </div>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
